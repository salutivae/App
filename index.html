<script>
  (function () {
    /*
      ========================================================
      1. AJUSTAR SOMENTE A LINHA DE CONEXÃO
      ========================================================
    */

    const connectionPath =
      document.querySelector(
        ".hero-thread .thread path"
      );

    if (connectionPath) {
      connectionPath.setAttribute(
        "d",
        [
          "M230 108",

          /*
            Sai de Conectamos e segue em direção
            a cada ponto.
          */
          "C218 140 248 157 245 190",

          /*
            Faz a transição entre cada ponto
            e da jornada.
          */
          "C242 221 215 233 207 261",

          /*
            Continua suavemente em direção
            ao próximo ponto.
          */
          "C200 289 222 304 236 326",

          /*
            Segue para a parte inferior,
            sem atravessar nenhuma palavra.
          */
          "C251 350 245 374 229 397",

          /*
            Termina antes da frase
            do seu paciente.
          */
          "C220 410 219 422 223 434"
        ].join(" ")
      );
    }


    /*
      ========================================================
      2. REMOVER SOMENTE:
         "Para profissionais da saúde"
         e o pequeno traço abaixo.
      ========================================================
    */

    const professionalTitle =
      document.querySelector(".hero .prof");

    const professionalRule =
      document.querySelector(".hero .rule");

    if (professionalTitle) {
      professionalTitle.remove();
    }

    if (professionalRule) {
      professionalRule.remove();
    }


    /*
      ========================================================
      3. TROCAR SOMENTE A FRASE FINAL
      ========================================================
    */

    const footerTitle =
      document.querySelector(
        ".site-footer .footer-title"
      );

    if (footerTitle) {
      footerTitle.innerHTML =
        "O cuidado não termina na consulta." +
        "<br>" +
        "Ele continua em cada passo.";
    }
  })();
</script>
